apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these labels are replica set labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend       # Fixed spelling: teir → tier
    component: frontend  # Fixed: components → component (singular)
spec:                    # Fixed: secp → spec
  replicas: 3
  selector:
    # using these labels replica set selects the pod
    matchLabels:         # Fixed: matchLables → matchLabels
      project: roboshop
      purpose: rs-demo
      tier: frontend     # Fixed spelling
      component: frontend  # Fixed spelling
  # this pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend     # Fixed spelling
        component: frontend  # Fixed spelling
    spec:
      containers:
      - name: nginx
        image: nginx
        # Removed invalid field: components: frontend